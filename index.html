<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Birthday Game</title>
<style>
body{margin:0;font-family:Arial;background:#ffeef5;text-align:center;overflow:hidden}
#game{position:relative;width:100vw;height:100vh}
.cat{position:absolute;width:120px;cursor:pointer}
#text{position:absolute;top:20px;width:100%;font-size:20px}
.gift{position:absolute;width:100px;cursor:pointer}
.balloon{position:absolute;width:60px;cursor:pointer}
.final{font-size:30px;margin-top:40vh}
</style>
</head>
<body>

<div id="game">
<div id="text">Follow me! 🐱</div>
<img src="https://i.imgur.com/J5LVHEL.png" class="cat" id="cat">
</div>

<script>
let cat=document.getElementById("cat");
let text=document.getElementById("text");
let game=document.getElementById("game");

let stage=1;
let giftClicks=0;
let balloonsPopped=0;

// move cat randomly
function moveCat(){
  if(stage!==1) return;
  cat.style.left=Math.random()*80+"vw";
  cat.style.top=Math.random()*70+"vh";
}

setInterval(moveCat,1000);

cat.onclick=()=>{
  if(stage===1){
    stage=2;
    cat.remove();
    spawnGift();
  }
}

function spawnGift(){
  text.innerText="Click the gift 10x! 🎁";
  let gift=document.createElement("img");
  gift.src="https://i.imgur.com/8Km9tLL.png";
  gift.className="gift";
  gift.style.left="45vw";
  gift.style.top="50vh";

  gift.onclick=()=>{
    giftClicks++;
    if(giftClicks>=10){
      gift.remove();
      spawnBalloons();
    }
  }

  game.appendChild(gift);
}

function spawnBalloons(){
  stage=3;
  text.innerText="Pop all 5 balloons! 🎈";

  for(let i=0;i<5;i++){
    let b=document.createElement("img");
    b.src="https://i.imgur.com/9yG6F5B.png";
    b.className="balloon";
    b.style.left=Math.random()*90+"vw";
    b.style.top="100vh";

    game.appendChild(b);

    // rise animation
    let rise=setInterval(()=>{
      let top=parseFloat(b.style.top);
      if(top<=0) clearInterval(rise);
      else b.style.top=(top-1)+"vh";
    },30);

    b.onclick=()=>{
      b.remove();
      balloonsPopped++;
      if(balloonsPopped>=5){
        showFinal();
      }
    }
  }
}

function showFinal(){
  text.innerText="";
  game.innerHTML=`
    <div class="final">
      🎉🐱 Happy Birthday! 🐱🎉<br><br>
      <img src="https://i.imgur.com/J5LVHEL.png" width="120">
      <img src="https://i.imgur.com/J5LVHEL.png" width="120">
      <img src="https://i.imgur.com/J5LVHEL.png" width="120"><br><br>
      🎂🎂🎂 BIG CAKE 🎂🎂🎂
    </div>
  `;
}

</script>

</body>
</html>
